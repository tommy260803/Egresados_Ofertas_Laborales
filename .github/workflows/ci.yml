name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 20
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID_FRONTEND: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies (Backend)
        run: cd backend && npm ci

      - name: Lint Backend
        run: cd backend && npm run lint

      - name: Test Backend (Unit)
        run: cd backend && npm run test

      - name: Install dependencies (Frontend)
        run: cd frontend && npm ci

      - name: Lint Frontend
        run: cd frontend && npm run lint

      - name: Test Frontend (Unit)
        run: cd frontend && npm run test

      - name: Playwright E2E tests
        run: cd frontend && npx playwright install --with-deps && npm run test:e2e

  build-docker:
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Backend Image
        run: docker build -f docker/Dockerfile.backend -t backend-test .
      - name: Build Worker Image
        run: docker build -f docker/Dockerfile.worker -t worker-test .
      - name: Build Frontend Image
        run: docker build -f docker/Dockerfile.frontend -t frontend-test .

  deploy:
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      # Deploy Frontend to Vercel
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Deploy Frontend to Vercel
        run: |
          cd frontend
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      # Deploy Backend + Worker to Railway
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy Backend to Railway
        run: |
          railway up --service=backend --token=$RAILWAY_TOKEN
          railway up --service=worker --token=$RAILWAY_TOKEN
      - name: Run migrations on Railway
        run: railway run --service=backend "npm run migration:run" --token=$RAILWAY_TOKEN